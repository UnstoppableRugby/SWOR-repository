    <!--
      ══════════════════════════════════════════════════════════════
      CACHE BUSTER — runs BEFORE any module JS loads.
      This guarantees the browser gets fresh code even if a service

      Build: 2026-03-08T19:09:00Z  v2.7
      ══════════════════════════════════════════════════════════════
    -->
    <script>
      (function() {
        var BUILD_VERSION = 'v2.7-20260308-1909';
        var LAST_BUILD_KEY = 'swor_build_version';
        var lastBuild = localStorage.getItem(LAST_BUILD_KEY);

        console.log('[SWOR-BOOT] Cache buster running. Current build:', BUILD_VERSION, 'Last build:', lastBuild);

        // Always clear all SW caches to ensure fresh assets
        if ('caches' in window) {
          caches.keys().then(function(names) {
            if (names.length > 0) {
              console.log('[SWOR-BOOT] Clearing', names.length, 'cache(s):', names);
            }
            names.forEach(function(name) {
              caches.delete(name);
            });
          });
        }

        // Force any existing service worker to update
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(reg) {
              console.log('[SWOR-BOOT] Forcing SW update for scope:', reg.scope);
              reg.update();
              // If there's a waiting worker, tell it to activate immediately
              if (reg.waiting) {
                console.log('[SWOR-BOOT] Activating waiting SW');
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        }

        // Store current build version
        localStorage.setItem(LAST_BUILD_KEY, BUILD_VERSION);
      })();
    </script>
